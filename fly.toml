# fly.toml app configuration file generated for breadboard-sim on 2026-07-08T22:15:43-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'breadboard-sim'
primary_region = 'dfw'

[build]
  dockerfile = 'backend/Dockerfile'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
